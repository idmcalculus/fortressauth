name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      test: ${{ steps.filter.outputs.test }}
      examples: ${{ steps.filter.outputs.examples }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            git ls-files > changed-files.txt
          else
            git diff --name-only "${BASE_SHA}" "${{ github.sha }}" > changed-files.txt
          fi

          infra=false
          test=false
          examples=false
          docker=false

          while IFS= read -r file; do
            [ -n "${file}" ] || continue
            case "${file}" in
              packages/infra-hetzner/*)
                infra=true
                ;;
              packages/*)
                test=true
                examples=true
                docker=true
                ;;
              examples/*)
                examples=true
                ;;
              docker/*)
                docker=true
                ;;
              package.json|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json|tsconfig.json|biome.json)
                test=true
                examples=true
                docker=true
                ;;
            esac
          done < changed-files.txt

          echo "infra=${infra}" >> "${GITHUB_OUTPUT}"
          echo "test=${test}" >> "${GITHUB_OUTPUT}"
          echo "examples=${examples}" >> "${GITHUB_OUTPUT}"
          echo "docker=${docker}" >> "${GITHUB_OUTPUT}"

          echo "infra=${infra}"
          echo "test=${test}"
          echo "examples=${examples}"
          echo "docker=${docker}"

  infra:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.infra == 'true' }}

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: true

      - name: Lint infra package
        run: pnpm --filter @fortressauth/infra-hetzner lint

      - name: Typecheck infra package
        run: pnpm --filter @fortressauth/infra-hetzner typecheck

  test:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.test == 'true' }}

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm rebuild better-sqlite3
        env:
          CI: true

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test:coverage
        env:
          MONGODB_TEST_URL: mongodb://localhost:27017/fortressauth_test

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: matrix.node-version == '24.x'
        with:
          files: ./packages/*/coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  examples:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.examples == 'true' }}

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make g++

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Build React example
        run: pnpm --filter fortressauth-web-react build

      - name: Build Vue example
        run: pnpm --filter fortressauth-web-vue build

      - name: Build Svelte example
        run: pnpm --filter fortressauth-web-svelte build

      - name: Build Angular example
        run: pnpm --filter fortressauth-web-angular build

  docker:
    runs-on: ubuntu-latest
    needs: [changes, infra, test, examples]
    if: >-
      ${{
        always() &&
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        needs.changes.outputs.docker == 'true' &&
        (needs.infra.result == 'success' || needs.infra.result == 'skipped') &&
        (needs.test.result == 'success' || needs.test.result == 'skipped') &&
        (needs.examples.result == 'success' || needs.examples.result == 'skipped')
      }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          load: true
          tags: fortressauth:latest
          cache-from: type=gha,scope=ci-docker
          cache-to: type=gha,mode=max,scope=ci-docker

      - name: Test Docker image
        run: |
          docker run -d -p 3000:3000 --name test-server fortressauth:latest
          sleep 5
          curl -f http://localhost:3000/health || (docker logs test-server && exit 1)
          docker stop test-server

  ci-status:
    runs-on: ubuntu-latest
    needs: [changes, infra, test, examples, docker]
    if: ${{ always() }}
    steps:
      - name: Verify CI results
        shell: bash
        env:
          INFRA_RESULT: ${{ needs.infra.result }}
          TEST_RESULT: ${{ needs.test.result }}
          EXAMPLES_RESULT: ${{ needs.examples.result }}
          DOCKER_RESULT: ${{ needs.docker.result }}
        run: |
          set -euo pipefail

          for result in "${INFRA_RESULT}" "${TEST_RESULT}" "${EXAMPLES_RESULT}" "${DOCKER_RESULT}"; do
            case "${result}" in
              success|skipped)
                ;;
              *)
                echo "CI dependency failed with result: ${result}" >&2
                exit 1
                ;;
            esac
          done
