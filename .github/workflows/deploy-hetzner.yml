name: Deploy Hetzner

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-hetzner-main
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    environment: hetzner
    env:
      PULUMI_STACK: ${{ vars.PULUMI_STACK }}
      DOCKER_IMAGE: docker.io/${{ secrets.DOCKER_USERNAME }}/fortressauth

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve deployment ref
        shell: bash
        run: |
          set -euo pipefail
          echo "Deploying ref ${GITHUB_REF} at commit ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"

      - name: Validate deployment config
        shell: bash
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          HETZNER_DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${PULUMI_STACK:-}" ]; then
            echo "Missing repository variable PULUMI_STACK (example: idmcalculus/fortressauth-hetzner/dev)." >&2
            exit 1
          fi

          if [ -z "${PULUMI_ACCESS_TOKEN:-}" ]; then
            echo "Missing environment secret PULUMI_ACCESS_TOKEN." >&2
            exit 1
          fi

          if [ -z "${HETZNER_DEPLOY_SSH_PRIVATE_KEY:-}" ]; then
            echo "Missing environment secret HETZNER_DEPLOY_SSH_PRIVATE_KEY." >&2
            exit 1
          fi

          if [ -z "${DOCKER_USERNAME:-}" ] || [ -z "${DOCKER_PASSWORD:-}" ]; then
            echo "Missing environment secrets DOCKER_USERNAME and/or DOCKER_PASSWORD." >&2
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push app image
        id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.DOCKER_IMAGE }}:sha-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
            ${{ env.DOCKER_IMAGE }}:main
          cache-from: type=gha,scope=deploy-hetzner
          cache-to: type=gha,mode=max,scope=deploy-hetzner

      - name: Set up Pulumi
        uses: pulumi/actions@v6

      - name: Detect runner public IPv4
        id: runner_ip
        shell: bash
        run: |
          set -euo pipefail

          RUNNER_IPV4="$(curl -fsS https://api.ipify.org)"
          if ! [[ "${RUNNER_IPV4}" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            echo "Failed to detect a valid runner IPv4 address: ${RUNNER_IPV4}" >&2
            exit 1
          fi

          echo "cidr=${RUNNER_IPV4}/32" >> "${GITHUB_OUTPUT}"

      - name: Apply Pulumi update
        working-directory: packages/infra-hetzner
        env:
          FORTRESSAUTH_DEPLOY_RUNNER_CIDR: ${{ steps.runner_ip.outputs.cidr }}
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          HETZNER_DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_DEPLOY_SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_REF="${DOCKER_IMAGE}@${{ steps.image.outputs.digest }}"
          echo "Deploying new image ${IMAGE_REF}"

          pulumi stack select "${PULUMI_STACK}"
          pulumi config set fortressauth-hetzner:appImage "${IMAGE_REF}" --stack "${PULUMI_STACK}"
          pulumi config set fortressauth-hetzner:enableAppDeploy true --stack "${PULUMI_STACK}"
          pulumi config set fortressauth-hetzner:deploySshUser admin --stack "${PULUMI_STACK}"
          pulumi config set fortressauth-hetzner:deploySshPort 22 --stack "${PULUMI_STACK}"
          printf '%s' "${HETZNER_DEPLOY_SSH_PRIVATE_KEY}" | \
            pulumi config set fortressauth-hetzner:deploySshPrivateKey --secret --stack "${PULUMI_STACK}"

          pulumi preview --stack "${PULUMI_STACK}" --diff
          pulumi up --yes --stack "${PULUMI_STACK}"

      - name: Smoke test deployed app
        working-directory: packages/infra-hetzner
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          APP_IP="$(pulumi stack output appPublicIpv4 --stack "${PULUMI_STACK}")"
          APP_URL="$(pulumi stack output appUrl --stack "${PULUMI_STACK}")"
          APP_DOMAIN="${APP_URL#https://}"
          APP_DOMAIN="${APP_DOMAIN#http://}"

          curl -fsS --retry 20 --retry-all-errors --retry-delay 3 \
            --resolve "${APP_DOMAIN}:443:${APP_IP}" \
            "https://${APP_DOMAIN}/health" >/dev/null

      - name: Smoke test deployed OpenAPI
        working-directory: packages/infra-hetzner
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          APP_IP="$(pulumi stack output appPublicIpv4 --stack "${PULUMI_STACK}")"
          APP_URL="$(pulumi stack output appUrl --stack "${PULUMI_STACK}")"
          APP_DOMAIN="${APP_URL#https://}"
          APP_DOMAIN="${APP_DOMAIN#http://}"

          SPEC_FILE="$(mktemp)"
          trap 'rm -f "${SPEC_FILE}"' EXIT

          curl -fsS --retry 20 --retry-all-errors --retry-delay 3 \
            --resolve "${APP_DOMAIN}:443:${APP_IP}" \
            "https://${APP_DOMAIN}/openapi.json" > "${SPEC_FILE}"

          node -e '
            const fs = require("node:fs");
            const spec = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            const expectedServer = process.argv[2];
            const servers = (spec.servers ?? []).map((server) => server.url);
            if (!servers.includes(expectedServer)) {
              console.error(`Expected deployed OpenAPI servers to include ${expectedServer}. Got: ${servers.join(", ")}`);
              process.exit(1);
            }
            if (!Object.prototype.hasOwnProperty.call(spec.paths ?? {}, "/metrics")) {
              console.error("Expected deployed OpenAPI document to include /metrics.");
              process.exit(1);
            }
          ' "${SPEC_FILE}" "${APP_URL}"

      - name: Remove runner SSH access
        if: ${{ success() }}
        working-directory: packages/infra-hetzner
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          pulumi up --yes --stack "${PULUMI_STACK}"
