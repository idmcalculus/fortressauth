config:
  hcloud:token:
    secure: "<set-with-pulumi-config>"
  fortressauth-hetzner:location: nbg1
  fortressauth-hetzner:image: ubuntu-24.04
  fortressauth-hetzner:networkCidr: 10.20.0.0/16
  fortressauth-hetzner:networkZone: eu-central
  fortressauth-hetzner:subnetCidr: 10.20.1.0/24
  fortressauth-hetzner:appPrivateIp: 10.20.1.10
  fortressauth-hetzner:dbPrivateIp: 10.20.1.20
  fortressauth-hetzner:databaseTopology: dedicated-vm
  fortressauth-hetzner:postgresImage: postgres:16-alpine
  fortressauth-hetzner:enableTailscale: false
  fortressauth-hetzner:tailscaleAppHostname: fortressauth-dev-app
  fortressauth-hetzner:tailscaleDbHostname: fortressauth-dev-db
  fortressauth-hetzner:appServerType: cpx21
  fortressauth-hetzner:dbServerType: cpx31
  # Recommended low-cost single-node switch after a verified dump and reviewed preview:
  # fortressauth-hetzner:databaseTopology: co-located-container
  # fortressauth-hetzner:appServerType: cx23
  # fortressauth-hetzner:enableBackups: true
  # fortressauth-hetzner:enableTailscale: true
  # fortressauth-hetzner:tailscaleAuthKey:
  #   secure: "<set-with-pulumi-config --secret>"
  fortressauth-hetzner:protectServers: false
  fortressauth-hetzner:appDomain: api.example.com
  fortressauth-hetzner:frontendBaseUrl: https://fortressauth.com
  fortressauth-hetzner:appImage: docker.io/your-docker-user/fortressauth@sha256:<image-digest>
  fortressauth-hetzner:enableAppDeploy: true
  fortressauth-hetzner:deploySshUser: admin
  fortressauth-hetzner:deploySshPort: 22
  fortressauth-hetzner:deploySshPrivateKey:
    secure: "<set-with-pulumi-config --secret>"
  fortressauth-hetzner:sshKeyNames:
    - your-ssh-key-name-in-hetzner
  fortressauth-hetzner:adminIpv4Cidrs:
    - 203.0.113.10/32
  fortressauth-hetzner:adminIpv6Cidrs:
    - 2001:db8::10/128
  fortressauth-hetzner:dbName: fortressauth
  fortressauth-hetzner:dbUser: fortressauth
  fortressauth-hetzner:dbPassword:
    secure: "<set-with-pulumi-config --secret>"
  fortressauth-hetzner:appEnv:
    CORS_ORIGINS: https://fortressauth.com,https://react-demo.fortressauth.com,https://vue-demo.fortressauth.com,https://svelte-demo.fortressauth.com,https://angular-demo.fortressauth.com
    EMAIL_PROVIDER: console
  fortressauth-hetzner:appSecretEnv:
    secure: "<set-with-pulumi-config --path --secret fortressauth-hetzner:appSecretEnv.SMTP_PASS>"
